<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholai · 功能入口</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 220px;
    --bg: #f2f4f2;
    --surface: #ffffff;
    --border: #e4e8e4;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --accent: #2F4F4F;
    --accent-dark: #03301C;
    --accent-light: #e8f5ee;
    --accent-mid: #dce8e2;
    --sidebar-text: #6b8f7a;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
  }

  /* ── 侧边栏 ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg);
    min-height: 100vh;
    position: fixed;
    top: 0; left: 0;
    display: flex;
    flex-direction: column;
    padding: 20px 0;
    animation: fadeIn 0.3s ease both;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    text-decoration: none;
  }
  .logo-mark {
    width: 26px; height: 26px;
    background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
  }
  .logo-mark svg { width: 13px; height: 13px; color: #fff; }
  .logo-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .logo-tag {
    font-size: 10px; font-weight: 600;
    background: var(--accent); color: #fff;
    padding: 1px 6px; border-radius: 4px;
  }

  .nav-section { padding: 0 10px; }
  .nav-label {
    font-size: 10px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-muted);
    padding: 10px 10px 4px;
  }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 7px;
    font-size: 13.5px; color: var(--sidebar-text);
    cursor: pointer; transition: all 0.15s;
    text-decoration: none;
  }
  .nav-item:hover { background: var(--border); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-mid); color: var(--accent); font-weight: 600; }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
  .nav-item .nav-soon {
    margin-left: auto;
    font-size: 9px; font-weight: 600;
    background: #f3f4f6; color: var(--text-muted);
    padding: 1px 5px; border-radius: 4px;
    letter-spacing: 0.3px;
  }

  .sidebar-footer {
    margin-top: auto;
    padding: 14px 10px 4px;
    border-top: 1px solid var(--border);
  }
  .user-row {
    display: flex; align-items: center; gap: 9px;
    padding: 7px 10px; border-radius: 7px;
    cursor: pointer; transition: background 0.15s;
  }
  .user-row:hover { background: var(--border); }
  .user-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; color: var(--accent);
    flex-shrink: 0;
  }
  .user-name { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .logout-btn {
    width: 26px; height: 26px;
    border-radius: 6px; border: none;
    background: transparent; color: var(--text-muted);
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.15s;
  }
  .logout-btn svg { width: 14px; height: 14px; }
  .logout-btn:hover { background: var(--accent-mid); color: var(--accent); }

  /* ── 主内容 ── */
  .content {
    margin-left: var(--sidebar-w);
    flex: 1;
    padding: 16px;
  }
  .content-card {
    background: var(--surface);
    border-radius: 14px;
    padding: 32px 36px;
    min-height: calc(100vh - 32px);
    animation: fadeUp 0.35s ease both;
    animation-delay: 0.05s;
  }

  /* ── 欢迎区 ── */
  .welcome {
    display: flex; align-items: flex-start; justify-content: space-between;
    margin-bottom: 36px;
  }
  .welcome-text h1 {
    font-size: 22px; font-weight: 800;
    color: var(--text-primary); letter-spacing: -0.5px;
    margin-bottom: 4px;
  }
  .welcome-text p { font-size: 13.5px; color: var(--text-secondary); }
  .welcome-date {
    font-size: 12px; color: var(--text-muted);
    background: var(--bg);
    padding: 6px 14px; border-radius: 20px;
    border: 1px solid var(--border);
  }

  /* ── 功能卡片网格 ── */
  .section-label {
    font-size: 11px; font-weight: 700;
    letter-spacing: 1px; text-transform: uppercase;
    color: var(--text-muted);
    margin-bottom: 16px;
  }
  .feature-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
  }

  .feature-card {
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 24px;
    cursor: pointer;
    transition: all 0.2s;
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    position: relative;
    overflow: hidden;
    animation: fadeUp 0.35s ease both;
  }
  .feature-card:hover {
    border-color: #b8ccc5;
    box-shadow: 0 6px 24px rgba(47,79,79,0.1);
    transform: translateY(-2px);
  }
  .feature-card.active {
    border-color: #b8ccc5;
    background: linear-gradient(135deg, #f7faf8 0%, #eef4f0 100%);
  }
  .feature-card.disabled {
    cursor: default;
    opacity: 0.6;
  }
  .feature-card.disabled:hover { transform: none; box-shadow: none; border-color: var(--border); }

  .card-icon {
    width: 42px; height: 42px;
    border-radius: 11px;
    display: flex; align-items: center; justify-content: center;
    margin-bottom: 16px;
  }
  .card-icon svg { width: 20px; height: 20px; }
  .card-icon.green { background: #e8f5ee; color: #2d6a4f; }
  .card-icon.blue  { background: #eef0fe; color: #4a58e0; }
  .card-icon.orange { background: #fef3e8; color: #c2670a; }
  .card-icon.purple { background: #f5f0fe; color: #7c3aed; }

  .card-title {
    font-size: 15px; font-weight: 700;
    color: var(--text-primary); margin-bottom: 6px;
  }
  .card-desc {
    font-size: 12.5px; line-height: 1.6;
    color: var(--text-secondary); flex: 1;
    margin-bottom: 16px;
  }

  .card-stats {
    display: flex; gap: 16px;
    padding-top: 14px;
    border-top: 1px solid var(--border);
    margin-bottom: 16px;
  }
  .stat-item { display: flex; flex-direction: column; gap: 2px; }
  .stat-val { font-size: 18px; font-weight: 800; color: var(--accent); }
  .stat-lbl { font-size: 11px; color: var(--text-muted); }

  .card-enter {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 12.5px; font-weight: 600;
    color: var(--accent);
    padding: 7px 14px;
    background: var(--accent-mid);
    border-radius: 8px;
    transition: all 0.15s;
    align-self: flex-start;
  }
  .feature-card:hover .card-enter {
    background: var(--accent);
    color: #fff;
  }
  .card-enter svg { width: 13px; height: 13px; }

  .card-soon {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 600;
    color: var(--text-muted);
    padding: 6px 12px;
    background: var(--bg);
    border-radius: 8px;
    align-self: flex-start;
    border: 1px solid var(--border);
  }

  /* ── 动画 ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }
</style>
</head>
<body>

<aside class="sidebar">
  <a class="sidebar-logo" href="index.html">
    <div class="logo-mark">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"/></svg>
    </div>
    <span class="logo-name">Scholai</span>
    <span class="logo-tag">Beta</span>
  </a>
  <div class="nav-section">
    <div class="nav-label">功能</div>
    <a class="nav-item active" href="index.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/><rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/></svg>
      功能总览
    </a>
    <a class="nav-item" href="grading-list.html">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
      智能批改
    </a>
    <a class="nav-item disabled" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
      题库管理
      <span class="nav-soon">即将上线</span>
    </a>
    <a class="nav-item disabled" href="#">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
      学情分析
      <span class="nav-soon">即将上线</span>
    </a>
  </div>
  <div class="sidebar-footer">
    <div class="user-row">
      <div class="user-avatar">刘</div>
      <span class="user-name">刘老师</span>
      <button class="logout-btn" title="退出">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
      </button>
    </div>
  </div>
</aside>

<main class="content">
  <div class="content-card">

    <div class="welcome">
      <div class="welcome-text">
        <h1>欢迎回来，刘老师</h1>
        <p>今天有什么需要处理的教学任务？</p>
      </div>
      <div class="welcome-date" id="dateDisplay"></div>
    </div>

    <div class="section-label">全部功能</div>

    <div class="feature-grid">

      <!-- 智能批改 -->
      <a class="feature-card active" href="grading-list.html" style="animation-delay:0.1s">
        <div class="card-icon green">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 11l3 3L22 4"/><path d="M21 12v7a2 2 0 01-2 2H5a2 2 0 01-2-2V5a2 2 0 012-2h11"/></svg>
        </div>
        <div class="card-title">智能批改</div>
        <div class="card-desc">上传学生作业照片，AI 自动识别手写内容并对照标准答案逐题批改，输出完整批改报告。</div>
        <div class="card-stats">
          <div class="stat-item">
            <span class="stat-val">4</span>
            <span class="stat-lbl">批改任务</span>
          </div>
          <div class="stat-item">
            <span class="stat-val">17</span>
            <span class="stat-lbl">已批改学生</span>
          </div>
          <div class="stat-item">
            <span class="stat-val">2</span>
            <span class="stat-lbl">进行中</span>
          </div>
        </div>
        <div class="card-enter">
          进入功能
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>

      <!-- 题库管理 -->
      <div class="feature-card disabled" style="animation-delay:0.15s">
        <div class="card-icon blue">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
        </div>
        <div class="card-title">题库管理</div>
        <div class="card-desc">统一管理历次作业题目，支持按知识点、难度、年级分类检索，快速复用已有题目资源。</div>
        <div class="card-soon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          即将上线
        </div>
      </div>

      <!-- 学情分析 -->
      <div class="feature-card disabled" style="animation-delay:0.2s">
        <div class="card-icon orange">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>
        </div>
        <div class="card-title">学情分析</div>
        <div class="card-desc">汇总全班批改数据，可视化展示各知识点掌握情况、易错题型分布，辅助教学决策。</div>
        <div class="card-soon">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:11px;height:11px"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          即将上线
        </div>
      </div>

    </div>

  </div>
</main>

<script>
  const d = new Date();
  const days = ['周日','周一','周二','周三','周四','周五','周六'];
  document.getElementById('dateDisplay').textContent =
    `${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日 ${days[d.getDay()]}`;
</script>

</body>
</html>
