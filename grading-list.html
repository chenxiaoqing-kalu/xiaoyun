<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholai · 智能批改</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --sidebar-w: 220px;
    --bg: #f2f4f2;
    --surface: #ffffff;
    --border: #e4e8e4;
    --text-primary: #111827;
    --text-secondary: #6b7280;
    --text-muted: #9ca3af;
    --accent: #2F4F4F;
    --accent-dark: #03301C;
    --accent-light: #e8f5ee;
    --accent-mid: #dce8e2;
    --sidebar-text: #6b8f7a;
    --danger: #dc2626;
    --danger-light: #fef2f2;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif;
    background: var(--bg);
    color: var(--text-primary);
    min-height: 100vh;
    display: flex;
  }

  /* ── 侧边栏 ── */
  .sidebar {
    width: var(--sidebar-w);
    background: var(--bg);
    min-height: 100vh;
    position: fixed;
    top: 0; left: 0;
    display: flex; flex-direction: column;
    padding: 20px 0;
    animation: fadeIn 0.3s ease both;
  }
  .sidebar-logo {
    display: flex; align-items: center; gap: 10px;
    padding: 4px 20px 20px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 10px;
    text-decoration: none;
  }
  .logo-mark {
    width: 26px; height: 26px; background: var(--accent);
    border-radius: 6px;
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .logo-mark svg { width: 13px; height: 13px; color: #fff; }
  .logo-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .logo-tag { font-size: 10px; font-weight: 600; background: var(--accent); color: #fff; padding: 1px 6px; border-radius: 4px; }

  .nav-section { padding: 0 10px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); padding: 10px 10px 4px; }
  .nav-item {
    display: flex; align-items: center; gap: 9px;
    padding: 8px 10px; border-radius: 7px;
    font-size: 13.5px; color: var(--sidebar-text);
    cursor: pointer; transition: all 0.15s; text-decoration: none;
  }
  .nav-item:hover { background: var(--border); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-mid); color: var(--accent); font-weight: 600; }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
  .nav-item .nav-soon { margin-left: auto; font-size: 9px; font-weight: 600; background: #f3f4f6; color: var(--text-muted); padding: 1px 5px; border-radius: 4px; }

  .sidebar-footer { margin-top: auto; padding: 14px 10px 4px; border-top: 1px solid var(--border); }
  .user-row { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 7px; cursor: pointer; transition: background 0.15s; }
  .user-row:hover { background: var(--border); }
  .user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .user-name { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .logout-btn { width: 26px; height: 26px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .logout-btn svg { width: 14px; height: 14px; }
  .logout-btn:hover { background: var(--accent-mid); color: var(--accent); }

  /* ── 主内容 ── */
  .content { margin-left: var(--sidebar-w); flex: 1; padding: 16px; }
  .content-card {
    background: var(--surface); border-radius: 14px;
    padding: 28px 32px;
    min-height: calc(100vh - 32px);
    animation: fadeUp 0.35s ease both; animation-delay: 0.05s;
  }

  /* ── 页头 ── */
  .page-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 24px;
    animation: fadeUp 0.3s ease both; animation-delay: 0.1s;
  }
  .page-header-left { display: flex; align-items: center; gap: 10px; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-muted); margin-bottom: 4px; }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb span { font-size: 11px; }
  .page-header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .count-badge { font-size: 12px; background: var(--accent-light); color: var(--accent); padding: 2px 9px; border-radius: 20px; font-weight: 600; }

  .btn-primary {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 9px 18px; border-radius: 9px;
    font-size: 13.5px; font-weight: 600;
    color: #fff; background: var(--accent); border: none;
    cursor: pointer; transition: all 0.15s; text-decoration: none;
    box-shadow: 0 2px 8px rgba(47,79,79,0.25);
  }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); box-shadow: 0 4px 14px rgba(47,79,79,0.3); }
  .btn-primary svg { width: 14px; height: 14px; }

  /* ── 统计行 ── */
  .stats-row {
    display: flex; gap: 12px;
    margin-bottom: 24px;
    animation: fadeUp 0.3s ease both; animation-delay: 0.12s;
  }
  .stat-card {
    flex: 1; background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 18px;
  }
  .stat-card-val { font-size: 22px; font-weight: 800; color: var(--text-primary); margin-bottom: 2px; }
  .stat-card-lbl { font-size: 12px; color: var(--text-muted); }
  .stat-card.green .stat-card-val { color: #2d6a4f; }
  .stat-card.orange .stat-card-val { color: #c2670a; }

  /* ── 表格 ── */
  .table-wrap { animation: fadeUp 0.3s ease both; animation-delay: 0.15s; }
  .table-header {
    display: grid;
    grid-template-columns: 3fr 1fr 1.2fr 1.2fr 1fr;
    padding: 8px 14px;
    font-size: 11px; font-weight: 600;
    color: var(--text-muted); letter-spacing: 0.5px;
    text-transform: uppercase;
    border-bottom: 1px solid var(--border);
  }
  .table-row {
    display: grid;
    grid-template-columns: 3fr 1fr 1.2fr 1.2fr 1fr;
    align-items: center;
    padding: 13px 14px;
    border-bottom: 1px solid #eef0ee;
    transition: background 0.1s;
    border-radius: 8px;
    animation: fadeUp 0.3s ease both;
    cursor: pointer;
  }
  .table-row:last-child { border-bottom: none; }
  .table-row:hover { background: #eef4f0; }

  .row-name { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .task-icon {
    width: 32px; height: 32px; border-radius: 8px;
    background: var(--accent-light);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0;
    color: #2d6a4f;
  }
  .task-icon svg { width: 15px; height: 15px; }
  .task-name-text { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .task-class { font-size: 12px; color: var(--text-muted); }

  .col-center { display: flex; align-items: center; justify-content: center; }
  .col-val { font-size: 13px; color: var(--text-secondary); }

  /* 状态标签 */
  .status-tag {
    display: inline-flex; align-items: center; gap: 5px;
    font-size: 11.5px; font-weight: 600;
    padding: 3px 10px; border-radius: 20px;
  }
  .status-tag .dot { width: 5px; height: 5px; border-radius: 50%; }
  .status-done { background: var(--accent-light); color: #2d6a4f; }
  .status-done .dot { background: #2d6a4f; }
  .status-processing { background: #fef3e8; color: #c2670a; }
  .status-processing .dot { background: #c2670a; animation: pulse 1.5s infinite; }
  .status-pending { background: #f3f4f6; color: var(--text-muted); }
  .status-pending .dot { background: var(--text-muted); }

  /* 进度条 */
  .progress-wrap { display: flex; align-items: center; gap: 8px; }
  .progress-bar { flex: 1; height: 5px; background: #e9ece9; border-radius: 3px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width 0.4s; }
  .progress-text { font-size: 12px; font-weight: 600; color: var(--text-secondary); white-space: nowrap; }

  /* 操作 */
  .row-actions { display: flex; gap: 4px; justify-content: center; }
  .icon-btn {
    width: 30px; height: 30px; border-radius: 7px; border: none;
    background: transparent; color: var(--text-muted);
    cursor: pointer; display: flex; align-items: center; justify-content: center;
    transition: all 0.15s; text-decoration: none;
  }
  .icon-btn svg { width: 15px; height: 15px; }
  .icon-btn:hover { background: var(--accent-mid); color: var(--accent); }
  .icon-btn.danger:hover { background: var(--danger-light); color: var(--danger); }

  /* 确认删除 modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: #fff; border-radius: 14px; padding: 26px 28px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); transform: translateY(8px); transition: transform 0.2s; }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-ghost { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-secondary); background: transparent; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; background: var(--danger); border: none; cursor: pointer; transition: all 0.15s; }
  .btn-danger:hover { background: #b91c1c; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
</style>
</head>

            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a class="icon-btn" href="grading-create.html" title="编辑任务">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
          </a>
          <button class="icon-btn danger" title="删除" onclick="confirmDelete(this)">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>
      </div>

    </div>
  </div>
</main>


<!-- 确认删除 modal -->
<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>确认删除</h3>
    <p id="deleteModalDesc">删除后数据不可恢复，确认继续？</p>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeDeleteModal()">取消</button>
      <button class="btn-danger" id="deleteConfirmBtn">删除</button>
    </div>
  </div>
</div>

<script>
  let pendingDeleteRow = null;

  function confirmDelete(btn) {
    const row = btn.closest('.table-row');
    const name = row.querySelector('.task-name-text').textContent.trim();
    pendingDeleteRow = row;
    document.getElementById('deleteModalDesc').textContent = `删除「${name}」后数据不可恢复，确认继续？`;
    document.getElementById('deleteModal').classList.add('show');
    document.getElementById('deleteConfirmBtn').onclick = function() {
      pendingDeleteRow.remove();
      closeDeleteModal();
    };
  }

  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('show');
    pendingDeleteRow = null;
  }

  document.getElementById('deleteModal').addEventListener('click', function(e) {
    if (e.target === this) closeDeleteModal();
  });
</script>

</body>
</html>
