<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Scholai · 2604-W13 原题出题</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --sidebar-w: 220px; --bg: #f2f4f2; --surface: #ffffff;
    --border: #e4e8e4; --text-primary: #111827;
    --text-secondary: #6b7280; --text-muted: #9ca3af;
    --accent: #2F4F4F; --accent-dark: #03301C;
    --accent-light: #e8f5ee; --accent-mid: #dce8e2;
    --sidebar-text: #6b8f7a;
  }
  body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Hiragino Sans GB", sans-serif; background: var(--bg); color: var(--text-primary); min-height: 100vh; display: flex; }

  .sidebar { width: var(--sidebar-w); background: var(--bg); min-height: 100vh; position: fixed; top: 0; left: 0; display: flex; flex-direction: column; padding: 20px 0; }
  .sidebar-logo { display: flex; align-items: center; gap: 10px; padding: 4px 20px 20px; border-bottom: 1px solid var(--border); margin-bottom: 10px; text-decoration: none; }
  .logo-mark { width: 26px; height: 26px; background: var(--accent); border-radius: 6px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .logo-mark svg { width: 13px; height: 13px; color: #fff; }
  .logo-name { font-size: 14px; font-weight: 700; color: var(--text-primary); }
  .logo-tag { font-size: 10px; font-weight: 600; background: var(--accent); color: #fff; padding: 1px 6px; border-radius: 4px; }
  .nav-section { padding: 0 10px; }
  .nav-label { font-size: 10px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; color: var(--text-muted); padding: 10px 10px 4px; }
  .nav-item { display: flex; align-items: center; gap: 9px; padding: 8px 10px; border-radius: 7px; font-size: 13.5px; color: var(--sidebar-text); cursor: pointer; transition: all 0.15s; text-decoration: none; }
  .nav-item:hover { background: var(--border); color: var(--text-primary); }
  .nav-item.active { background: var(--accent-mid); color: var(--accent); font-weight: 600; }
  .nav-item svg { width: 15px; height: 15px; flex-shrink: 0; }
  .nav-item .nav-soon { margin-left: auto; font-size: 9px; font-weight: 600; background: #f3f4f6; color: var(--text-muted); padding: 1px 5px; border-radius: 4px; }
  .sidebar-footer { margin-top: auto; padding: 14px 10px 4px; border-top: 1px solid var(--border); }
  .user-row { display: flex; align-items: center; gap: 9px; padding: 7px 10px; border-radius: 7px; cursor: pointer; transition: background 0.15s; }
  .user-row:hover { background: var(--border); }
  .user-avatar { width: 26px; height: 26px; border-radius: 50%; background: var(--accent-light); display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; color: var(--accent); flex-shrink: 0; }
  .user-name { font-size: 13px; color: var(--text-secondary); flex: 1; }
  .logout-btn { width: 26px; height: 26px; border-radius: 6px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .logout-btn svg { width: 14px; height: 14px; }
  .logout-btn:hover { background: var(--accent-mid); color: var(--accent); }

  .content { margin-left: var(--sidebar-w); flex: 1; padding: 16px; }
  .content-card { background: var(--surface); border-radius: 14px; padding: 28px 32px; min-height: calc(100vh - 32px); animation: fadeUp 0.35s ease both; animation-delay: 0.05s; }

  .page-header { margin-bottom: 20px; }
  .breadcrumb { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--text-muted); margin-bottom: 6px; }
  .breadcrumb a { color: var(--text-muted); text-decoration: none; }
  .breadcrumb a:hover { color: var(--accent); }
  .breadcrumb span { font-size: 11px; }
  .header-row { display: flex; align-items: center; justify-content: space-between; }
  .header-left { display: flex; align-items: center; gap: 12px; }
  .page-header h1 { font-size: 18px; font-weight: 800; letter-spacing: -0.3px; }
  .status-tag { display: inline-flex; align-items: center; gap: 5px; font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
  .status-tag .dot { width: 5px; height: 5px; border-radius: 50%; }
  .status-done { background: var(--accent-light); color: #2d6a4f; }
  .status-done .dot { background: #2d6a4f; }
  .status-processing { background: #fef3e8; color: #c2670a; }
  .status-processing .dot { background: #c2670a; animation: pulse 1.5s infinite; }
  .type-badge { display: inline-flex; align-items: center; font-size: 11.5px; font-weight: 600; padding: 3px 10px; border-radius: 20px; background: #eef0fe; color: #4a58e0; }

  .task-info-bar { display: flex; align-items: center; gap: 16px; flex-wrap: wrap; background: var(--bg); border: 1px solid var(--border); border-radius: 10px; padding: 14px 18px; margin-bottom: 24px; }
  .info-item { display: flex; flex-direction: column; gap: 2px; align-items: center; }
  .info-lbl { font-size: 11px; color: var(--text-muted); font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
  .info-val { font-size: 13.5px; font-weight: 600; color: var(--text-primary); }
  .info-divider { width: 1px; height: 28px; background: var(--border); }
  .file-link { font-size: 12px; color: var(--text-secondary); cursor: pointer; padding: 2px 8px; background: #fff; border: 1px solid var(--border); border-radius: 5px; transition: all 0.15s; white-space: nowrap; text-decoration: none; }
  .file-link:hover { background: var(--accent-mid); border-color: #b8ccc5; color: var(--accent); }

  .btn-primary { display: inline-flex; align-items: center; gap: 6px; padding: 8px 16px; border-radius: 9px; font-size: 13px; font-weight: 600; color: #fff; background: var(--accent); border: none; cursor: pointer; transition: all 0.15s; box-shadow: 0 2px 8px rgba(47,79,79,0.25); }
  .btn-primary:hover { background: var(--accent-dark); transform: translateY(-1px); }
  .btn-primary svg { width: 13px; height: 13px; }
  .btn-primary:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }

  .btn-view-result { display: inline-flex; align-items: center; gap: 5px; padding: 7px 14px; border-radius: 8px; font-size: 12.5px; font-weight: 600; color: var(--accent); background: var(--accent-mid); border: none; cursor: pointer; transition: all 0.15s; white-space: nowrap; text-decoration: none; }
  .btn-view-result:hover { background: var(--accent); color: #fff; }
  .btn-view-result svg { width: 13px; height: 13px; }

  .result-section { margin-top: 8px; }
  .result-section-header { display: flex; align-items: center; gap: 8px; margin-bottom: 12px; }
  .result-section-title { font-size: 11.5px; font-weight: 700; letter-spacing: 0.8px; text-transform: uppercase; color: var(--text-muted); display: flex; align-items: center; gap: 6px; flex: 1; }
  .result-section-title::after { content:''; flex:1; height:1px; background:var(--border); }
  .count-badge { font-size: 12px; background: var(--accent-light); color: var(--accent); padding: 2px 9px; border-radius: 20px; font-weight: 600; }

  .result-list { display: flex; flex-direction: column; gap: 10px; }
  .result-file-card { display: flex; align-items: center; justify-content: space-between; background: var(--bg); border: 1px solid var(--border); border-radius: 12px; padding: 16px 20px; animation: fadeUp 0.25s ease both; }
  .result-file-card.generating { border-color: #f0c97a; background: #fffbf0; }
  .result-file-left { display: flex; align-items: center; gap: 14px; }
  .result-file-icon { width: 38px; height: 38px; border-radius: 9px; background: var(--accent-mid); display: flex; align-items: center; justify-content: center; color: var(--accent); flex-shrink: 0; }
  .result-file-icon svg { width: 18px; height: 18px; }
  .result-file-icon.generating { background: #fef3e8; color: #c2670a; }
  .result-file-name { font-size: 13.5px; font-weight: 700; color: var(--text-primary); margin-bottom: 3px; }
  .result-file-meta { font-size: 12px; color: var(--text-muted); }
  .result-file-actions { display: flex; gap: 8px; align-items: center; }
  .icon-btn { width: 30px; height: 30px; border-radius: 7px; border: none; background: transparent; color: var(--text-muted); cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.15s; }
  .icon-btn svg { width: 15px; height: 15px; }
  .icon-btn:hover { background: #fef2f2; color: #dc2626; }
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.2); display: flex; align-items: center; justify-content: center; z-index: 300; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.show { opacity: 1; pointer-events: all; }
  .modal { background: #fff; border-radius: 14px; padding: 26px 28px; width: 360px; box-shadow: 0 20px 60px rgba(0,0,0,0.15); transform: translateY(8px); transition: transform 0.2s; }
  .modal-overlay.show .modal { transform: translateY(0); }
  .modal h3 { font-size: 15px; font-weight: 700; margin-bottom: 6px; }
  .modal p { font-size: 13px; color: var(--text-muted); margin-bottom: 20px; }
  .modal-footer { display: flex; gap: 8px; justify-content: flex-end; }
  .btn-ghost { padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; color: var(--text-secondary); background: transparent; border: 1.5px solid var(--border); cursor: pointer; transition: all 0.15s; }
  .btn-ghost:hover { background: var(--bg); }
  .btn-danger { padding: 8px 18px; border-radius: 8px; font-size: 13px; font-weight: 600; color: #fff; background: #dc2626; border: none; cursor: pointer; transition: all 0.15s; }
  .btn-danger:hover { background: #b91c1c; }

  @keyframes fadeUp { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
  @keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.4; } }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .spin { animation: spin 1s linear infinite; display: inline-block; }
</style>
</head>

    <a class="nav-item active" href="quiz-list.html"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 015.83 1c0 2-3 3-3 3"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>智能出题</a>

<main class="content">
  <div class="content-card">
    <div class="page-header">
      <div class="breadcrumb">
        <a href="index.html">首页</a><span>›</span>
        <a href="quiz-list.html">智能出题</a><span>›</span>
        <span style="color:var(--text-primary)">2604-W13 原题出题</span>
      </div>
      <div class="header-row">
        <div class="header-left">
          <h1>2604-W13 原题出题</h1>
          <span class="type-badge">原题出题</span>
          <span class="status-tag status-done"><span class="dot"></span>已完成</span>
        </div>
        <button class="btn-primary" id="regenBtn" onclick="regenerate()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
          重新出题
        </button>
      </div>
    </div>

    <div class="task-info-bar">
      <div class="info-item">
        <span class="info-lbl">来源文件</span>
        <span class="info-val" style="display:flex;gap:6px;flex-wrap:wrap">
          <a class="file-link" href="javascript:void(0)" target="_blank">📄 2604-W13习题集.pdf</a>
        </span>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <span class="info-lbl">最新出题数</span>
        <span class="info-val" id="latestCount">8 题</span>
      </div>
      <div class="info-divider"></div>
      <div class="info-item">
        <span class="info-lbl">创建时间</span>
        <span class="info-val">06-09</span>
      </div>
    </div>

    <div class="result-section">
      <div class="result-section-header">
        <div class="result-section-title">出题结果</div>
        <span class="count-badge" id="resultCount">1 次</span>
      </div>
      <div class="result-list" id="resultList">
        <div class="result-file-card">
          <div class="result-file-left">
            <div class="result-file-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
            </div>
            <div>
              <div class="result-file-name">2604-W13 原题出题-结果.md</div>
              <div class="result-file-meta">8 题 · 生成于 06-09 15:12</div>
            </div>
          </div>
          <div class="result-file-actions">
            <a class="btn-view-result" href="javascript:void(0)" target="_blank">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
              查看
            </a>
            <a class="btn-view-result" href="javascript:void(0)" download>
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
              下载
            </a>
            <button class="icon-btn" onclick="confirmDelete(this)" title="删除">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>

<div class="modal-overlay" id="deleteModal">
  <div class="modal">
    <h3>确认删除</h3>
    <p id="deleteModalDesc"></p>
    <div class="modal-footer">
      <button class="btn-ghost" onclick="closeDeleteModal()">取消</button>
      <button class="btn-danger" id="deleteConfirmBtn">删除</button>
    </div>
  </div>
</div>

<script>
  let genCount = 1;
  let pendingDeleteCard = null;

  function confirmDelete(btn) {
    pendingDeleteCard = btn.closest('.result-file-card');
    const name = pendingDeleteCard.querySelector('.result-file-name').textContent.trim();
    document.getElementById('deleteModalDesc').textContent = `删除「${name}」后不可恢复，确认继续？`;
    document.getElementById('deleteModal').classList.add('show');
    document.getElementById('deleteConfirmBtn').onclick = function() {
      pendingDeleteCard.remove();
      genCount = document.querySelectorAll('#resultList .result-file-card').length;
      document.getElementById('resultCount').textContent = `${genCount} 次`;
      closeDeleteModal();
    };
  }

  function closeDeleteModal() {
    document.getElementById('deleteModal').classList.remove('show');
    pendingDeleteCard = null;
  }

  document.addEventListener('DOMContentLoaded', () => {
    document.getElementById('deleteModal').addEventListener('click', function(e) {
      if (e.target === this) closeDeleteModal();
    });
  });

  function regenerate() {
    const btn = document.getElementById('regenBtn');
    btn.disabled = true;
    btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg> 生成中…';

    const now = new Date();
    const timeStr = `${String(now.getMonth()+1).padStart(2,'0')}-${String(now.getDate()).padStart(2,'0')} ${String(now.getHours()).padStart(2,'0')}:${String(now.getMinutes()).padStart(2,'0')}`;

    // 先插入生成中卡片
    const card = document.createElement('div');
    card.className = 'result-file-card generating';
    card.innerHTML = `
      <div class="result-file-left">
        <div class="result-file-icon generating">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="spin"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg>
        </div>
        <div>
          <div class="result-file-name">生成中…</div>
          <div class="result-file-meta">请稍候</div>
        </div>
      </div>`;
    const list = document.getElementById('resultList');
    list.insertBefore(card, list.firstChild);

    setTimeout(() => {
      genCount++;
      card.className = 'result-file-card';
      card.innerHTML = `
        <div class="result-file-left">
          <div class="result-file-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 00-2 2v16a2 2 0 002 2h12a2 2 0 002-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/></svg>
          </div>
          <div>
            <div class="result-file-name">2604-W13 原题出题-结果（第${genCount}次）.md</div>
            <div class="result-file-meta">8 题 · 生成于 ${timeStr}</div>
          </div>
        </div>
        <div class="result-file-actions">
          <a class="btn-view-result" href="javascript:void(0)" target="_blank">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
            查看
          </a>
          <a class="btn-view-result" href="javascript:void(0)" download>
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 01-2 2H5a2 2 0 01-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
            下载
          </a>
          <button class="icon-btn" onclick="confirmDelete(this)" title="删除">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 01-2 2H8a2 2 0 01-2-2L5 6"/><path d="M10 11v6M14 11v6"/><path d="M9 6V4a1 1 0 011-1h4a1 1 0 011 1v2"/></svg>
          </button>
        </div>`;
      document.getElementById('resultCount').textContent = `${genCount} 次`;
      btn.disabled = false;
      btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="1 4 1 10 7 10"/><path d="M3.51 15a9 9 0 102.13-9.36L1 10"/></svg> 重新出题';
    }, 2000);
  }
</script>
